<!-- Script untuk Modal Daftar Jadwal -->
<script>
$(document).ready(function() {
    $('#daftarJadwalModal').on('show.bs.modal', function (event) {
        var button = $(event.relatedTarget);
        var scheduleId = button.data('jadwal-id');
        var tanggal = button.data('tanggal');
        var waktu = button.data('waktu');
        var materi = button.data('materi');
        
        console.log('Schedule ID:', scheduleId); // Debug log
        
        var modal = $(this);
        modal.find('input[name="schedule_id"]').val(scheduleId);
        modal.find('#detail_jadwal').html(
            'Tanggal: ' + tanggal + '<br>' +
            'Waktu: ' + waktu + '<br>' +
            'Materi: ' + materi
        );
    });

    // Validasi form sebelum submit
    $('#daftarJadwalModal form').on('submit', function(e) {
        var scheduleId = $('#schedule_id').val();
        if (!scheduleId) {
            e.preventDefault();
            alert('Data jadwal tidak valid!');
            return false;
        }
        console.log('Form submitted with schedule_id:', scheduleId); // Debug log
    });
});
</script>
